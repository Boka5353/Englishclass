<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>EnglishClass - Login</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #7b2cbf; font-family: sans-serif; }
        .glass-card { background: white; padding: 40px; border-radius: 30px; text-align: center; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #5a189a; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        #error-msg { color: red; font-size: 12px; }
    </style>
</head>
<body>

    <div id="login-box" class="glass-card">
        <h1 style="color: #5a189a;">🟣 EnglishClass</h1>
        <input type="text" id="user" placeholder="Login">
        <input type="password" id="pass" placeholder="Hasło">
        <button onclick="startLogin()">ZALOGUJ SIĘ</button>
        <p id="error-msg"></p>
    </div>

    <div id="lobby-box" class="glass-card hidden">
        <h2 id="hello"></h2>
        <div id="t-tools" class="hidden">
            <input type="text" id="st-name" placeholder="Login ucznia (Kasia8299)">
            <button onclick="goClass()" style="background: orange;">START LEKCJI 🚀</button>
        </div>
        <div id="s-tools" class="hidden">
            <div id="inv-box" style="padding:10px; border:2px dashed #7b2cbf;">Czekaj na nauczyciela...</div>
        </div>
    </div>

    <script>
        const users = {
            "martyna73792": { p: "nauczyciel123", r: "t" },
            "Kasia8299": { p: "uczen456", r: "s" }
        };

        const cfg = { databaseURL: "https://moja-szkola-class-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(cfg);
        const db = firebase.database();
        let me = "";

        function startLogin() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            
            if(users[u] && users[u].p === p) {
                me = u;
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('lobby-box').classList.remove('hidden');
                document.getElementById('hello').innerText = "Witaj " + u;
                
                if(users[u].r === "t") {
                    document.getElementById('t-tools').classList.remove('hidden');
                } else {
                    document.getElementById('s-tools').classList.remove('hidden');
                    db.ref('lobby').on('value', (s) => {
                        const d = s.val();
                        for(let k in d) {
                            if(d[k].student === me && d[k].active) {
                                document.getElementById('inv-box').innerHTML = 
                                `<button onclick="location.href='classroom.html?room='+k+'&user='+me">DOŁĄCZ ✅</button>`;
                            }
                        }
                    });
                }
            } else {
                document.getElementById('error-msg').innerText = "Zły login lub hasło!";
            }
        }

        function goClass() {
            const s = document.getElementById('st-name').value.trim();
            const r = "room_" + me + "_" + s;
            db.ref('lobby/' + r).set({ teacher: me, student: s, active: true, stars: 0, currentLesson: "lekcja1", slideIndex: 1 })
            .then(() => { location.href = "classroom.html?room=" + r + "&user=" + me; });
        }
    </script>
</body>
</html>
