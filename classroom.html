<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Novakid Style - Classroom</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        /* --- STYLIZACJA UKŁADU --- */
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            font-family: 'Poppins', sans-serif; 
            background: #f0f4f8; 
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex; /* Dzieli stronę na Lewo i Prawo */
            height: 100vh;
            width: 100vw;
            padding: 20px;
            gap: 20px;
        }

        /* LEWA STRONA - SLAJDY (Na środku) */
        .main-area {
            flex: 3; /* Zajmuje 3 części miejsca */
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 25px;
            border: 4px solid #e0e6ed;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .stars-header {
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            background: #f8fafc;
        }
        .star { font-size: 35px; opacity: 0.15; transition: 0.3s; }
        .star.active { opacity: 1; transform: scale(1.2); text-shadow: 0 0 15px #ffca28; }

        .presentation-box {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fafafa;
        }
        #slide-img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .bottom-toolbar {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: #f8fafc;
            border-top: 2px solid #e0e6ed;
        }

        /* PRAWA STRONA - KAMERKI (Jedna pod drugą) */
        .side-panel {
            flex: 1; /* Zajmuje 1 część miejsca */
            display: flex;
            flex-direction: column; /* Ustawia kamerki w pionie */
            gap: 20px;
            justify-content: center;
        }

        .video-wrapper {
            width: 100%;
            aspect-ratio: 4/3;
            background: #1a1a1a;
            border-radius: 25px;
            position: relative;
            overflow: hidden;
        }

        /* Fioletowa ramka Nauczyciela */
        .teacher-frame {
            border: 6px solid #7b2cbf;
            box-shadow: 0 0 20px rgba(123, 44, 191, 0.6);
        }

        /* Pomarańczowa ramka Ucznia */
        .student-frame {
            border: 6px solid #ff9100;
            box-shadow: 0 0 20px rgba(255, 145, 0, 0.6);
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        .name-tag {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
        }

        /* PRZYCISKI STEROWANIA */
        .tool-btn {
            background: white; border: none; border-radius: 50%;
            width: 55px; height: 55px; font-size: 22px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .teacher-panel {
            display: flex; align-items: center; gap: 15px;
            background: #e2e8f0; padding: 10px 20px; border-radius: 50px;
        }
        .hidden { display: none; }
    </style>
</head>
<body class="class-body">

    <div class="app-container">
        <div class="main-area">
            <div class="stars-header">
                <span class="star" id="s1">⭐</span>
                <span class="star" id="s2">⭐</span>
                <span class="star" id="s3">⭐</span>
                <span class="star" id="s4">⭐</span>
                <span class="star" id="s5">⭐</span>
            </div>

            <div class="presentation-box">
                <img id="slide-img" src="" alt="Ładowanie...">
                <canvas id="paint-canvas"></canvas>
            </div>

            <div class="bottom-toolbar">
                <button class="tool-btn">✏️</button>
                <button class="tool-btn">🗑️</button>
                
                <div id="teacher-only" class="teacher-panel hidden">
                    <button onclick="changeSlide(-1)" class="tool-btn">◀</button>
                    <span id="page-num" style="font-weight: bold; color: #5a189a;">1</span>
                    <button onclick="changeSlide(1)" class="tool-btn">▶</button>
                    <button onclick="giveStar()" class="tool-btn" style="background: gold;">⭐</button>
                    <select onchange="changeLesson(this.value)" style="padding: 8px; border-radius: 10px;">
                        <option value="lekcja1">Lekcja 1</option>
                        <option value="lekcja2">Lekcja 2</option>
                    </select>
                </div>
                
                <button class="tool-btn" style="background: #ff4757; color: white;" onclick="location.href='index.html'">📞</button>
            </div>
        </div>

        <div class="side-panel">
            <div class="video-wrapper teacher-frame">
                <video id="localVideo" autoplay muted playsinline></video>
                <div class="name-tag">NAUCZYCIEL</div>
            </div>
            
            <div class="video-wrapper student-frame">
                <video id="remoteVideo" autoplay playsinline></video>
                <div class="name-tag">UCZEŃ</div>
            </div>
        </div>
    </div>

    <script>
        // --- KONFIGURACJA FIREBASE ---
        const firebaseConfig = { 
            databaseURL: "https://moja-szkola-class-default-rtdb.europe-west1.firebasedatabase.app/" 
        };
        
        const params = new URLSearchParams(window.location.search);
        const roomId = params.get('room');
        const user = params.get('user');
        const isTeacher = (user === "martyna73792");

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const roomRef = db.ref('lobby/' + roomId);

        if (isTeacher) document.getElementById('teacher-only').classList.remove('hidden');

        // Synchronizacja
        roomRef.on('value', (snap) => {
            const data = snap.val();
            if(!data) return;
            document.getElementById('slide-img').src = `lekcje/${data.currentLesson}/${data.slideIndex}.jpg`;
            document.getElementById('page-num').innerText = data.slideIndex;
            for(let i=1; i<=5; i++) {
                const s = document.getElementById('s' + i);
                if(i <= data.stars) s.classList.add('active');
                else s.classList.remove('active');
            }
        });

        function changeSlide(v) {
            if(!isTeacher) return;
            roomRef.child('slideIndex').transaction(c => (c+v < 1) ? 1 : c+v);
        }

        function giveStar() {
            if(!isTeacher) return;
            roomRef.child('stars').transaction(c => ((c || 0) >= 5) ? 0 : (c || 0) + 1);
        }

        function changeLesson(l) {
            if(!isTeacher) return;
            roomRef.update({ currentLesson: l, slideIndex: 1 });
        }

        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(s => { document.getElementById('localVideo').srcObject = s; })
            .catch(e => console.log("Błąd kamery"));
    </script>
</body>
</html>
