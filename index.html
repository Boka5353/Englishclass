<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Szkoła Online - Logowanie</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <div id="login-screen" class="box">
        <h2>Witaj w Szkole! 🍎</h2>
        <input type="text" id="username" placeholder="Login">
        <input type="password" id="password" placeholder="Hasło">
        <button onclick="login()">ZALOGUJ SIĘ</button>
        <p id="error-msg" style="color: red;"></p>
    </div>

    <div id="lobby-screen" class="box hidden">
        <h2 id="welcome-msg"></h2>
        <div id="teacher-tools" class="hidden">
            <h3>Panel Nauczyciela</h3>
            <input type="text" id="student-target" placeholder="Wpisz login ucznia (Kasia8299)">
            <button onclick="startLesson()" style="background: #FF9100;">OTWÓRZ KLASĘ 🚀</button>
        </div>
        <div id="student-tools" class="hidden">
            <h3>Panel Ucznia</h3>
            <div id="invite-box">Czekanie na zaproszenie...</div>
        </div>
    </div>

    <script>
        const usersDB = {
            "martyna73792": { pass: "nauczyciel123", role: "teacher" },
            "Kasia8299": { pass: "uczen456", role: "student" }
        };

        // SPRAWDŹ TEN LINK - musi być taki jak w Twojej konsoli!
        const firebaseConfig = { 
            databaseURL: "https://moja-szkola-class-default-rtdb.europe-west1.firebasedatabase.app/" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentUser = "";

        function login() {
            const userIn = document.getElementById('username').value.trim();
            const passIn = document.getElementById('password').value.trim();
            if (usersDB[userIn] && usersDB[userIn].pass === passIn) {
                currentUser = userIn;
                document.getElementById('login-screen').style.display = "none";
                document.getElementById('lobby-screen').classList.remove('hidden');
                document.getElementById('welcome-msg').innerText = "Cześć " + userIn;
                
                if (usersDB[userIn].role === "teacher") {
                    document.getElementById('teacher-tools').classList.remove('hidden');
                } else {
                    document.getElementById('student-tools').classList.remove('hidden');
                    listenForInvite();
                }
            } else {
                document.getElementById('error-msg').innerText = "Błędny login lub hasło!";
            }
        }

        function startLesson() {
            const student = document.getElementById('student-target').value.trim();
            if(!student) return alert("Wpisz login ucznia!");
            
            // Tworzymy unikalne ID pokoju
            const roomId = "lekcja_" + currentUser + "_" + student;
            
            db.ref('lobby/' + roomId).set({
                teacher: currentUser,
                student: student,
                active: true,
                stars: 0,
                currentLesson: "lekcja1",
                slideIndex: 1
            }).then(() => {
                window.location.href = `classroom.html?room=${roomId}&user=${currentUser}`;
            });
        }

        function listenForInvite() {
            db.ref('lobby').on('value', (snap) => {
                const data = snap.val();
                const inviteBox = document.getElementById('invite-box');
                inviteBox.innerHTML = "Szukanie lekcji...";

                for (let id in data) {
                    // Kluczowe: uczeń szuka wpisu, gdzie jego login zgadza się z polem 'student'
                    if (data[id].student === currentUser && data[id].active) {
                        inviteBox.innerHTML = `
                            <div style="background: #E9D5FF; padding: 15px; border-radius: 10px; border: 2px dashed #7B2CBF;">
                                <b>Nauczyciel ${data[id].teacher} zaprasza!</b><br><br>
                                <button onclick="joinClass('${id}')">WEJDŹ DO KLASY ✅</button>
                            </div>`;
                    }
                }
            });
        }

        function joinClass(id) {
            window.location.href = `classroom.html?room=${id}&user=${currentUser}`;
        }
    </script>
</body>
</html>
