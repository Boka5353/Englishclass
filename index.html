<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>EnglishClass - Logowanie</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        /* Fioletowe tło i wyśrodkowanie */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #5a189a 0%, #7b2cbf 100%);
            font-family: 'Poppins', sans-serif;
        }
        .glass-card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
            width: 350px;
        }
        .purple-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e0aaff;
            border-radius: 12px;
            box-sizing: border-box;
            outline: none;
        }
        .btn-primary {
            width: 100%;
            padding: 15px;
            background: #7b2cbf;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn-primary:hover { background: #5a189a; }
        .hidden { display: none; }
        .error-msg { color: #ff4d4d; font-size: 13px; margin-top: 10px; font-weight: bold; }
        .invite-box { margin-top: 20px; padding: 15px; background: #f3e8ff; border: 2px dashed #7b2cbf; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="login-screen" class="glass-card">
        <h1 style="color: #5a189a; margin: 0;">🟣 EnglishClass</h1>
        <p style="color: #9d4edd; margin-bottom: 25px;">Witaj w swojej szkole!</p>
        
        <input type="text" id="username" placeholder="Login" class="purple-input">
        <input type="password" id="password" placeholder="Hasło" class="purple-input">
        
        <button id="login-btn" onclick="loginUser()" class="btn-primary">ZALOGUJ SIĘ</button>
        <p id="error-msg" class="error-msg"></p>
    </div>

    <div id="lobby-screen" class="glass-card hidden">
        <h2 id="welcome-msg" style="color: #5a189a;"></h2>
        
        <div id="teacher-tools" class="hidden">
            <p>Z kim masz dziś lekcję?</p>
            <input type="text" id="student-target" placeholder="Login ucznia (Kasia8299)" class="purple-input">
            <button onclick="startLesson()" class="btn-primary" style="background: #ff9100;">OTWÓRZ KLASĘ 🚀</button>
        </div>

        <div id="student-tools" class="hidden">
            <div id="invite-display" class="invite-box">
                <p>Czekanie na zaproszenie od Martyny...</p>
            </div>
        </div>
    </div>

    <script>
        // BAZA UŻYTKOWNIKÓW
        const usersDB = {
            "martyna73792": { pass: "nauczyciel123", role: "teacher" },
            "Kasia8299": { pass: "uczen456", role: "student" }
        };

        // KONFIGURACJA FIREBASE (Wklej swój link!)
        const firebaseConfig = { 
            databaseURL: "https://moja-szkola-class-default-rtdb.europe-west1.firebasedatabase.app/" 
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();
        let currentUser = "";

        // FUNKCJA LOGOWANIA
        function loginUser() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const err = document.getElementById('error-msg');

            console.log("Próba logowania dla:", u); // Sprawdzenie w konsoli (F12)

            if (usersDB[u] && usersDB[u].pass === p) {
                currentUser = u;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('lobby-screen').classList.remove('hidden');
                document.getElementById('welcome-msg').innerText = "Cześć " + u + "!";
                
                if (usersDB[u].role === "teacher") {
                    document.getElementById('teacher-tools').classList.remove('hidden');
                } else {
                    document.getElementById('student-tools').classList.remove('hidden');
                    listenForInvite();
                }
            } else {
                err.innerText = "❌ Błędny login lub hasło!";
            }
        }

        // START LEKCJI (DLA NAUCZYCIELA)
        function startLesson() {
            const student = document.getElementById('student-target').value.trim();
            if (!student) { alert("Wpisz login ucznia!"); return; }
            
            const roomId = "lekcja_" + currentUser + "_" + student;
            db.ref('lobby/' + roomId).set({
                teacher: currentUser,
                student: student,
                active: true,
                stars: 0,
                currentLesson: "lekcja1",
                slideIndex: 1
            }).then(() => {
                window.location.href = "classroom.html?room=" + roomId + "&user=" + currentUser;
            });
        }

        // CZEKANIE NA ZAPROSZENIE (DLA UCZNIA)
        function listenForInvite() {
            db.ref('lobby').on('value', (snap) => {
                const data = snap.val();
                if (!data) return;
                
                for (let id in data) {
                    if (data[id].student === currentUser && data[id].active) {
                        document.getElementById('invite-display').innerHTML = `
                            <p>🌟 <b>${data[id].teacher}</b> zaprasza!</p>
                            <button onclick="window.location.href='classroom.html?room=${id}&user=${currentUser}'" class="btn-primary">DOŁĄCZ ✅</button>
                        `;
                    }
                }
            });
        }
    </script>
</body>
</html>
