<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom - EnglishClass</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        /* Przywrócenie fajniejszego wyglądu */
        * { box-sizing: border-box; }
        body.class-body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f0f2f5; overflow: hidden; }
        
        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* LEWA STRONA - PREZENTACJA */
        .main-area { flex: 4; display: flex; flex-direction: column; padding: 15px; position: relative; }
        
        .stars-display { height: 50px; display: flex; align-items: center; gap: 10px; padding-left: 20px; }
        .star { font-size: 30px; opacity: 0.2; transition: 0.3s; filter: grayscale(1); }
        .star.active { opacity: 1; filter: grayscale(0); transform: scale(1.2); }

        .presentation-box { 
            flex: 1; 
            background: white; 
            border-radius: 20px; 
            position: relative; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 2px solid #ddd;
        }
        #slide-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        #paint-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: crosshair; }

        /* DOLNY PASEK NARZĘDZI */
        .bottom-toolbar { 
            height: 90px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 20px; 
        }
        .tool-btn { 
            background: white; border: none; border-radius: 50%; width: 50px; height: 50px; 
            font-size: 20px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.2s;
        }
        .tool-btn:hover { transform: translateY(-3px); background: #f0f0f0; }
        .teacher-panel { display: flex; align-items: center; gap: 15px; background: #e0e0e0; padding: 10px 20px; border-radius: 50px; }

        /* PRAWA STRONA - WIDEO */
        .side-panel { flex: 1.2; background: #ffffff; display: flex; flex-direction: column; gap: 15px; padding: 15px; border-left: 1px solid #ddd; }
        .video-wrapper { 
            width: 100%; 
            aspect-ratio: 4/3; 
            background: #1a1a1a; 
            border-radius: 15px; 
            overflow: hidden; 
            position: relative; 
            border: 4px solid #7b2cbf; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        .name-tag { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); color: white; padding: 3px 10px; border-radius: 5px; font-size: 12px; }

        .hidden { display: none; }
    </style>
</head>
<body class="class-body">

    <div class="app-container">
        <div class="main-area">
            <div class="stars-display">
                <span class="star" id="s1">⭐</span>
                <span class="star" id="s2">⭐</span>
                <span class="star" id="s3">⭐</span>
                <span class="star" id="s4">⭐</span>
                <span class="star" id="s5">⭐</span>
            </div>

            <div class="presentation-box">
                <img id="slide-img" src="" alt="Ladowanie lekcji...">
                <canvas id="paint-canvas"></canvas>
            </div>

            <div class="bottom-toolbar">
                <button class="tool-btn">✏️</button>
                <button class="tool-btn">🗑️</button>
                
                <div id="teacher-only" class="teacher-panel hidden">
                    <button onclick="changeSlide(-1)" class="tool-btn">◀</button>
                    <span id="page-num" style="font-weight: bold; min-width: 30px; text-align: center;">1</span>
                    <button onclick="changeSlide(1)" class="tool-btn">▶</button>
                    <button onclick="giveStar()" class="tool-btn" style="background: #ffd700;">⭐</button>
                    <select onchange="changeLesson(this.value)" style="padding: 10px; border-radius: 10px;">
                        <option value="lekcja1">Lekcja 1: Hello!</option>
                        <option value="lekcja2">Lekcja 2: Colors</option>
                        <option value="lekcja3">Lekcja 3: Numbers</option>
                    </select>
