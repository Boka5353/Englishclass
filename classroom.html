<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Klasa Online</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body class="class-body">
    <div class="app-container">
        <div class="main-area">
            <div class="stars-display">
                <span id="s1">⭐</span><span id="s2">⭐</span><span id="s3">⭐</span><span id="s4">⭐</span><span id="s5">⭐</span>
            </div>
            <div class="presentation-box">
                <img id="slide-img" src="">
                <canvas id="paint-canvas"></canvas>
            </div>
            <div class="bottom-toolbar">
                <div id="teacher-ui" class="hidden">
                    <button onclick="changeSlide(-1)">◀</button>
                    <span id="page-num">1</span>
                    <button onclick="changeSlide(1)">▶</button>
                    <button onclick="giveStar()">+⭐</button>
                    <select onchange="changeLesson(this.value)">
                        <option value="lekcja1">Lekcja 1</option>
                        <option value="lekcja2">Lekcja 2</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="side-panel">
            <div class="video-wrapper"><video id="myVideo" autoplay muted></video></div>
            <div class="video-wrapper"><video id="remoteVideo" autoplay></video></div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const roomId = params.get('room');
        const user = params.get('user');
        const isTeacher = (user === "martyna73792");

        const firebaseConfig = { databaseURL: "https://moja-szkola-class-default-rtdb.europe-west1.firebasedatabase.app/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const roomRef = db.ref('lobby/' + roomId);

        if(isTeacher) document.getElementById('teacher-ui').classList.remove('hidden');

        // ODBIERANIE DANYCH (Dla Nauczyciela i Ucznia)
        roomRef.on('value', (snap) => {
            const data = snap.val();
            if(!data) return;
            document.getElementById('slide-img').src = `lekcje/${data.currentLesson}/${data.slideIndex}.jpg`;
            document.getElementById('page-num').innerText = data.slideIndex;
            for(let i=1; i<=5; i++) {
                document.getElementById('s'+i).style.opacity = (i <= data.stars) ? "1" : "0.2";
            }
        });

        function changeSlide(val) {
            roomRef.child('slideIndex').transaction(c => ((c || 1) + val < 1) ? 1 : (c || 1) + val);
        }

        function giveStar() {
            roomRef.child('stars').transaction(c => (c || 0) + 1);
        }

        function changeLesson(lesson) {
            roomRef.update({ currentLesson: lesson, slideIndex: 1 });
        }

        navigator.mediaDevices.getUserMedia({video:true, audio:true}).then(s => {
            document.getElementById('myVideo').srcObject = s;
        });
    </script>
</body>
</html>
